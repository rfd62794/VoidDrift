name: Deploy rfd-telemetry

on:
  push:
    branches: [main]
    paths:
      - 'rfd-telemetry/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy main.py
        run: |
          scp -P ${{ secrets.SSH_PORT }} -i ~/.ssh/deploy_key rfd-telemetry/main.py ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/rfd-telemetry/main.py

      - name: Restart service
        run: |
          echo "${{ secrets.SUDO_PASS }}" | ssh \
            -i ~/.ssh/deploy_key \
            -p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sudo -S systemctl restart rfd-telemetry"

      - name: Verify health
        run: |
          sleep 10
          curl -f https://rfditservices.com/api/telemetry/health || exit 1
