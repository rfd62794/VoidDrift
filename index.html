<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>VoidDrift WASM</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #050514;
        }
        canvas {
            width: 100%;
            height: 100%;
            max-width: 720px;
            max-height: 100vh;
            aspect-ratio: 9 / 16;
            display: block;
            margin: 0 auto;
            touch-action: none;
        }

        /* Fullscreen state — CSS pseudo-class works inside iframes */
        canvas:fullscreen,
        canvas:-webkit-full-screen,
        canvas:-moz-full-screen {
            width: 100vw;
            height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: auto;
            margin: 0;
        }
    </style>
</head>
<body>
    <canvas id="bevy-canvas"></canvas>
    <script>
        // Use ResizeObserver to detect when canvas size changes (including iframe fullscreen)
        const canvas = document.getElementById('bevy-canvas');
        if (canvas) {
            const resizeObserver = new ResizeObserver(entries => {
                for (let entry of entries) {
                    const width = entry.contentRect.width;
                    const height = entry.contentRect.height;
                    canvas.width = width;
                    canvas.height = height;
                }
            });
            
            // Observe the canvas element
            resizeObserver.observe(canvas);
            
            // Also observe the body to catch iframe fullscreen
            resizeObserver.observe(document.body);
        }
    </script>
    <script type="module">
        import init from './pkg/voidrift.js';
        init().then(() => {
            console.log('VoidDrift WASM loaded successfully');
        }).catch(err => {
            console.error('Failed to load VoidDrift WASM:', err);
        });
    </script>
</body>
</html>
