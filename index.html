<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>VoidDrift WASM</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #050514;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <canvas id="bevy-canvas"></canvas>
    <script type="module">
        import init from './voidrift.js';
        init().then(() => {
            console.log('VoidDrift WASM loaded successfully');
        }).catch(err => {
            // Filter out wasm-bindgen control flow exceptions
            if (err && err.message && err.message.includes('Using exceptions for control flow')) {
                console.log('VoidDrift WASM loaded successfully (control flow exception ignored)');
                return;
            }
            console.error('Failed to load VoidDrift WASM:', err);
        });
    </script>
</body>
</html>
